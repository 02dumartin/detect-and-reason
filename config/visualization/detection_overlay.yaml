# 예측/정답 overlay 이미지를 만들 때 공통으로 사용할 시각화 설정이다.
# tomato-detection-agentic 쪽의 기본 색 체계와 굵기 규칙을 그대로 맞춰 두었다.
overlay:
  font_path: /usr/share/fonts/truetype/noto/NotoSans-Regular.ttf
  font_size: 32
  box_thickness: 4

  # false면 "클래스명 + confidence"를 같이 그린다.
  # true면 클래스명만 그린다.
  label_only: false

  # 스마트폰 사진처럼 EXIF 회전 정보가 들어간 이미지에서도 bbox가 어긋나지 않게 한다.
  honor_exif: true
  transform_bbox_with_exif: true

  # 현재 detect-and-reason은 보정 이미지 경로를 따로 쓰지 않지만,
  # 참조 프로젝트와 옵션 구조를 맞추기 위해 필드는 유지한다.
  prefer_enhanced: false

  color_map_rgb:
    fully-ripe: [214, 66, 36]
    semi-ripe: [240, 186, 36]
    unripe: [106, 254, 152]
    none: [180, 180, 180]
