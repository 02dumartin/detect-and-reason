name: qwen3_vl_vllm

backend:
  type: qwen_vllm
  model_name: Qwen/Qwen3-VL-4B-Instruct
  batch_size: 4
  trust_remote_code: true
  max_images_per_prompt: 16

# instruct mode인데 이게 필요한건가
generation:
  max_new_tokens: 220
  repetition_penalty: 1.1
  do_sample: false
  temperature: 0.2
  top_p: 0.9

prompt:
  use_examples: true
  use_reasoning: true
  include_bbox_json: true
  example_picker:
    enabled: true
    source_split: train
    per_class: 2
    max_total_examples: 6
    resize: 224
    expand_ratio: 0.1
    min_size: 32
