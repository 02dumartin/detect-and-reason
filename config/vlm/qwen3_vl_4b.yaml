name: qwen3_vl_4b

backend:
  type: qwen_hf
  model_name: Qwen/Qwen3-VL-4B-Instruct
  batch_size: 8
  use_4bit: true
  compile_model: false

# instruct mode인데 이게 필요한건가
generation:
  max_new_tokens: 220
  repetition_penalty: 1.1
  do_sample: false
  temperature: 0.2
  top_p: 0.9
  top_k: 40

prompt:
  use_examples: true
  use_reasoning: true
  use_color_guide: true
  include_bbox_json: true
  example_picker:
    enabled: true
    source_split: train
    per_class: 2
    max_total_examples: 6
    resize: 224
    expand_ratio: 0.1
    min_size: 32
