name: default

task:
  target_class_mode: 3cls
  class_map:
    0: fully-ripe
    1: semi-ripe
    2: unripe

backend:
  type: qwen_hf
  model_name: Qwen/Qwen3-VL-4B-Instruct
  batch_size: 1
  use_4bit: true
  compile_model: false
  device_map: auto
  torch_dtype: auto
  trust_remote_code: true

generation:
  max_new_tokens: 220
  repetition_penalty: 1.1
  do_sample: false
  temperature: 0.2
  top_p: 0.9
  top_k: 40

input:
  split: test
  prediction_dir: null
  refresh_normalized: false
  max_samples: null

crop:
  expand_ratio: 0.1
  min_size: 32

prompt:
  use_reasoning: true
  use_examples: false
  use_color_guide: true
  include_bbox_json: true
  reasoning_max_words: 25
  system_message: null
  instruction: null
  examples: []
  example_picker:
    enabled: false
    source_split: train
    per_class: 2
    max_total_examples: null
    resize: 224
    expand_ratio: 0.1
    min_size: 32

output:
  save_overlay: true
  save_eval: true
  save_family_export: true
  overlay_config: config/visualization/detection_overlay.yaml
