name: yolo_world_1cls
family: yolo_world
framework: ultralytics
class_mode: 1cls
mode: detection_reasoning

model:
  init_weight: yolov8s-worldv2.pt

class_names:
  0: tomato

prompts:
  - tomato

train:
  epochs: 150
  imgsz: 640
  batch: 12
  workers: 8
  run_name: yolo_world_1cls

  augmentation:
    mosaic: 0.2
    close_mosaic: 10
    mixup: 0.1
    scale: 0.2
    translate: 0.1
    degrees: 10
    fliplr: 0.5
    hsv_h: 0.015
    hsv_s: 0.2
    hsv_v: 0.2

  patience: 10
  amp: true
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  cos_lr: true

val:
  split: test
  plots: true
  conf: null
  agnostic_nms: false
  iou_default:
    little: 0.5
    default: 0.7

predict:
  save: true
  save_txt: true
  save_conf: true
  conf: null
  agnostic_nms: false
  iou_default:
    little: 0.5
    default: 0.7

metrics:
  - mAP50
  - mAP50_95
  - detection_acc

dataset_overrides:
  big:
    source_dataset: laboro_big_1cls
    cache: disk
    data_yaml: data/yolo/laboro_big_1cls/data.yaml
    test_image_source: data/yolo/laboro_big_1cls/test/images
    runs_dir: runs/big/yolo_world_1cls
    eval_dir: result/detection_reasoning/big/yolo_world_1cls_eval
    prediction_dir: result/detection_reasoning/big/yolo_world_1cls_prediction
    qwen_dir: result/detection_reasoning/big/yolo_world_1cls_qwen

  little:
    source_dataset: laboro_little_1cls
    cache: disk
    data_yaml: data/yolo/laboro_little_1cls/data.yaml
    test_image_source: data/yolo/laboro_little_1cls/test/images
    runs_dir: runs/little/yolo_world_1cls
    eval_dir: result/detection_reasoning/little/yolo_world_1cls_eval
    prediction_dir: result/detection_reasoning/little/yolo_world_1cls_prediction
    qwen_dir: result/detection_reasoning/little/yolo_world_1cls_qwen

  tomatod:
    source_dataset: tomatod_1cls
    cache: ram
    data_yaml: data/yolo/tomatod_1cls/data.yaml
    test_image_source: data/yolo/tomatod_1cls/test/images
    runs_dir: runs/tomatod/yolo_world_1cls
    eval_dir: result/detection_reasoning/tomatod/yolo_world_1cls_eval
    prediction_dir: result/detection_reasoning/tomatod/yolo_world_1cls_prediction
    qwen_dir: result/detection_reasoning/tomatod/yolo_world_1cls_qwen

  merge:
    source_dataset: merge_1cls
    cache: disk
    data_yaml: data/yolo/merge_1cls/data.yaml
    test_image_source: data/yolo/merge_1cls/test/images
    runs_dir: runs/merge/yolo_world_1cls
    eval_dir: result/detection_reasoning/merge/yolo_world_1cls_eval
    prediction_dir: result/detection_reasoning/merge/yolo_world_1cls_prediction
    qwen_dir: result/detection_reasoning/merge/yolo_world_1cls_qwen

notes:
  - YOLO-World uses text prompts via model.set_classes(prompts)
  - val() does not pass conf explicitly in the current script
  - predict() does not pass conf explicitly in the current script
  - big, tomatod, merge use default iou=0.7
  - little uses default iou=0.5