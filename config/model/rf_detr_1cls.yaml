name: rf_detr_1cls
family: rf_detr
framework: rfdetr
class_mode: 1cls
mode: detection_reasoning

model:
  model_size: large
  init_weight: weights/rf-detr-large-2026.pth

class_names:
  0: tomato

train:
  epochs: 150
  imgsz: 640
  batch_size: 4
  grad_accum_steps: 3  # 유효 배치 4x3=12 (ultralytics 모델들과 동일하게 맞춤)
  lr: 1.0e-4
  lr_encoder: 1.5e-4
  weight_decay: 1.0e-4
  use_ema: true
  ema_decay: 0.993
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001
  num_workers: 2
  tensorboard: true

val:
  split: test
  conf_threshold: 0.01
  score_threshold_prf1: 0.5
  iou_threshold_prf1: 0.5

predict:
  conf: 0.25
  splits:
    - test
  save_visualizations: false

metrics:
  - mAP50
  - mAP50_95

dataset_overrides:
  big:
    source_dataset: laboro_big_1cls
    data_yaml: data/yolo/laboro_big_1cls/data.yaml
    rfdetr_dir: data/coco/laboro_big_1cls
    test_image_source: data/yolo/laboro_big_1cls/test/images
    runs_dir: runs/big/rf_detr_1cls
    eval_dir: result/detection_reasoning/big/rf_detr_1cls_eval
    prediction_dir: result/detection_reasoning/big/rf_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/big/rf_detr_1cls_qwen

  little:
    source_dataset: laboro_little_1cls
    data_yaml: data/yolo/laboro_little_1cls/data.yaml
    rfdetr_dir: data/coco/laboro_little_1cls
    test_image_source: data/yolo/laboro_little_1cls/test/images
    runs_dir: runs/little/rf_detr_1cls
    eval_dir: result/detection_reasoning/little/rf_detr_1cls_eval
    prediction_dir: result/detection_reasoning/little/rf_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/little/rf_detr_1cls_qwen

  tomatod:
    source_dataset: tomatod_1cls
    data_yaml: data/yolo/tomatod_1cls/data.yaml
    rfdetr_dir: data/coco/tomatod_1cls
    test_image_source: data/yolo/tomatod_1cls/test/images
    runs_dir: runs/tomatod/rf_detr_1cls
    eval_dir: result/detection_reasoning/tomatod/rf_detr_1cls_eval
    prediction_dir: result/detection_reasoning/tomatod/rf_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/tomatod/rf_detr_1cls_qwen

  merge_tomatod:
    source_dataset: merge_1cls
    cache: disk
    data_yaml: data/yolo/merge_1cls/data.yaml
    test_image_source: data/yolo/merge_1cls/test/images
    qwen_dir: result/detection_reasoning/merge/rf_detr_1cls_qwen
