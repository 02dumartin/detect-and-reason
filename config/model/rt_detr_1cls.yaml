name: rt_detr_1cls
family: rt_detr
framework: ultralytics
class_mode: 1cls
mode: detection_reasoning

model:
  init_weight: rtdetr-l.pt

class_names:
  0: tomato

train:
  epochs: 150
  imgsz: 640
  batch: 12
  workers: 8
  run_name: rt_detr_1cls

  augmentation:
    mosaic: 0.2
    close_mosaic: 10
    mixup: 0.1
    scale: 0.2
    translate: 0.1
    degrees: 10
    fliplr: 0.5
    hsv_h: 0.015
    hsv_s: 0.2
    hsv_v: 0.2

  patience: 10
  amp: true
  optimizer: AdamW
  lr0: 0.002
  lrf: 0.01
  cos_lr: true

val:
  split: test
  plots: true
  conf: 0.45
  max_det: 50
  iou_default:
    little: 0.45
    default: 0.55

predict:
  save: true
  save_txt: true
  save_conf: true
  conf: 0.45
  max_det: 50
  iou_default:
    little: 0.45
    default: 0.55

metrics:
  - mAP50
  - mAP50_95
  - detection_acc

dataset_overrides:
  big:
    source_dataset: laboro_big_1cls
    cache: disk
    data_yaml: data/yolo/laboro_big_1cls/data.yaml
    test_image_source: data/yolo/laboro_big_1cls/test/images
    runs_dir: runs/big/rt_detr_1cls
    eval_dir: result/detection_reasoning/big/rt_detr_1cls_eval
    prediction_dir: result/detection_reasoning/big/rt_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/big/rt_detr_1cls_qwen

  little:
    source_dataset: laboro_little_1cls
    cache: disk
    data_yaml: data/yolo/laboro_little_1cls/data.yaml
    test_image_source: data/yolo/laboro_little_1cls/test/images
    runs_dir: runs/little/rt_detr_1cls
    eval_dir: result/detection_reasoning/little/rt_detr_1cls_eval
    prediction_dir: result/detection_reasoning/little/rt_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/little/rt_detr_1cls_qwen

  tomatod:
    source_dataset: tomatod_1cls
    cache: ram
    data_yaml: data/yolo/tomatod_1cls/data.yaml
    test_image_source: data/yolo/tomatod_1cls/test/images
    runs_dir: runs/tomatod/rt_detr_1cls
    eval_dir: result/detection_reasoning/tomatod/rt_detr_1cls_eval
    prediction_dir: result/detection_reasoning/tomatod/rt_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/tomatod/rt_detr_1cls_qwen

  merge:
    source_dataset: merge_1cls
    cache: disk
    data_yaml: data/yolo/merge_1cls/data.yaml
    test_image_source: data/yolo/merge_1cls/test/images
    runs_dir: runs/merge/rt_detr_1cls
    eval_dir: result/detection_reasoning/merge/rt_detr_1cls_eval
    prediction_dir: result/detection_reasoning/merge/rt_detr_1cls_prediction
    qwen_dir: result/detection_reasoning/merge/rt_detr_1cls_qwen

notes:
  - val() passes conf=0.45, iou, and max_det explicitly
  - predict() passes conf=0.45, iou, and max_det explicitly
  - 1cls reports detection_acc only in the current script
  - big, tomatod, merge use default iou=0.55
  - little uses default iou=0.45
  - if you retrain with rtdetr-x.pt later, change model.init_weight only